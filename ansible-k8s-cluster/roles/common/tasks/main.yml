---
- name: Set timezone to Asia/Seoul
  ansible.builtin.command: timedatectl set-timezone Asia/Seoul
  changed_when: false


- name: Install basic packages
  dnf:
    name:
      - yum-utils
      - iproute-tc
      - curl
      - wget
      - vim
      - bash-completion
      - chrony
    state: present

- name: Enable chronyd
  systemd:
    name: chronyd
    enabled: true
    state: started

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Configure /etc/hosts
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED K8S HOSTS"
    block: |
      {% for host in k8s_hosts %}
      {{ host.ip }} {{ host.name }}
      {% endfor %}

- name: Disable firewalld
  systemd:
    name: firewalld
    enabled: false
    state: stopped
  ignore_errors: true

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Disable swap permanently in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Set SELinux permissive immediately
  command: setenforce 0
  failed_when: false
  changed_when: false

- name: Set SELinux permissive permanently
  replace:
    path: /etc/selinux/config
    regexp: '^SELINUX=enforcing'
    replace: 'SELINUX=permissive'

- name: Configure kernel modules for Kubernetes
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: '0644'

- name: Load overlay kernel module
  ansible.builtin.command: modprobe overlay
  changed_when: false

- name: Load br_netfilter kernel module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false

- name: Configure sysctl for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    owner: root
    group: root
    mode: '0644'

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false
